ja:
  # =========================
  # Rails標準エラーメッセージ形式
  # =========================
  errors:
    # 属性名を付けずメッセージ単体表示
    format: "%{message}"

    messages:
      not_saved:
        one: "エラーが発生しました"
        other: "%{count}件のエラーがあります"

      # フォールバック（英語に戻らないため）
      blank: "入力してください"
      taken: "この値は使用できません"
      too_short: "%{count}文字以上で入力してください"
      confirmation: "確認用の入力が一致しません"

  # =========================
  # ActiveRecord
  # =========================
  activerecord:

    # --- モデル名 ---
    models:
      advice_suggestion: "お悩み投稿"
      user: "ユーザー"
      profile: "プロフィール"

    # --- 属性名 ---
    attributes:
      advice_suggestion:
        title: "タイトル"
        category: "カテゴリ"
        body: "本文"
        status: "ステータス"
        created_at: "投稿日時"

      user:
        email: "メールアドレス"
        password: "パスワード"
        password_confirmation: "パスワード（確認）"
        current_password: "現在のパスワード"

      profile:
        display_name: "表示名"
        bio: "ひとこと"
        avatar: "アイコンURL"

    # --- エラーメッセージ（モデル別最優先） ---
    errors:
      models:

        advice_suggestion:
          attributes:
            title:
              blank: "タイトルを入力してください"

            body:
              blank: "本文を入力してください"

            category:
              required: "カテゴリを選択してください"
              blank: "カテゴリを選択してください"

        user:
          attributes:
            email:
              blank: "メールアドレスを入力してください"
              taken: "こちらのメールアドレスは登録できません"

            password:
              blank: "パスワードを入力してください"
              too_short: "パスワードは%{count}文字以上で入力してください"

            password_confirmation:
              blank: "確認用パスワードを入力してください"
              confirmation: "パスワード（確認）が一致しません"

            current_password:
              blank: "現在のパスワードを入力してください"
              invalid: "現在のパスワードが正しくありません"

  # =========================
  # enum 翻訳
  # =========================
  enums:
    advice_suggestion:
      status:
        pending: "承認待ち"
        approved: "承認済み"
        rejected: "却下"

  # =========================
  # 日付・時刻フォーマット
  # =========================
  time:
    formats:
      default: "%Y/%m/%d %H:%M"

  date:
    formats:
      default: "%Y/%m/%d"